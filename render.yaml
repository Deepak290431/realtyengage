# Render.com Blueprint Configuration for RealtyEngage
# All paths are relative to the repository root

databases:
  - name: realtyengage-db
    plan: starter
    databaseName: realtyengage
    user: realtyengage_user
    region: oregon
    ipAllowList: [] # Allow connections from anywhere

services:
  # Main API Service
  - type: web
    name: realtyengage-api
    env: node
    plan: starter
    region: oregon
    buildCommand: cd "Customer Engagement Platform/backend" && npm install
    startCommand: cd "Customer Engagement Platform/backend" && node server.js
    healthCheckPath: /api/health
    envVars:
      - key: NODE_ENV
        value: production
      - key: MONGODB_URI
        fromDatabase:
          name: realtyengage-db
          property: connectionString
      - key: JWT_SECRET
        generateValue: true
      - key: JWT_REFRESH_SECRET
        generateValue: true
      - key: PORT
        value: 5005
      - key: CORS_ORIGIN
        value: https://realtyengage-frontend.onrender.com
      - key: RATE_LIMIT_WINDOW
        value: 15
      - key: RATE_LIMIT_MAX
        value: 100
      - key: SESSION_SECRET
        generateValue: true
      - key: REDIS_URL
        fromService:
          type: redis
          name: realtyengage-cache
          property: connectionString
    autoDeploy: true

  # Background Worker Service
  - type: worker
    name: realtyengage-worker
    env: node
    plan: starter
    region: oregon
    buildCommand: cd "Customer Engagement Platform/backend" && npm install
    startCommand: cd "Customer Engagement Platform/backend" && npm run worker
    envVars:
      - key: NODE_ENV
        value: production
      - key: MONGODB_URI
        fromDatabase:
          name: realtyengage-db
          property: connectionString
      - key: REDIS_URL
        fromService:
          type: redis
          name: realtyengage-cache
          property: connectionString

  # Redis Cache Service
  - type: redis
    name: realtyengage-cache
    plan: starter
    region: oregon
    maxmemoryPolicy: allkeys-lru

  # Cron Job Service
  - type: cron
    name: realtyengage-scheduler
    env: node
    plan: starter
    region: oregon
    schedule: "0 0 * * *" # Daily at midnight
    buildCommand: cd "Customer Engagement Platform/backend" && npm install
    command: cd "Customer Engagement Platform/backend" && npm run cron:daily
    envVars:
      - key: NODE_ENV
        value: production
      - key: MONGODB_URI
        fromDatabase:
          name: realtyengage-db
          property: connectionString

  # Frontend Static Service
  - type: web
    name: realtyengage-frontend
    env: static
    buildCommand: cd "Customer Engagement Platform/frontend" && npm install && npm run build
    staticPublishPath: "Customer Engagement Platform/frontend/dist"
    envVars:
      - key: VITE_API_URL
        value: https://realtyengage-api.onrender.com/api
    routes:
      - type: rewrite
        source: /*
        destination: /index.html

# Environment Groups for shared secrets
envVarGroups:
  - name: realtyengage-secrets
    envVars:
      - key: JWT_SECRET
        generateValue: true
      - key: JWT_REFRESH_SECRET
        generateValue: true
      - key: SESSION_SECRET
        generateValue: true
      - key: ENCRYPTION_KEY
        generateValue: true
