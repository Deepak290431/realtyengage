# Render.com Blueprint Configuration for RealtyEngage (FREE TIER)
# All paths are relative to the repository root

# Note: Render does not provide hosted MongoDB. Using external MongoDB Atlas.
services:
  # Main API Service
  - type: web
    name: realtyengage-api
    env: node
    plan: free # Free Tier
    region: oregon
    buildCommand: cd "Customer Engagement Platform/backend" && npm install
    startCommand: cd "Customer Engagement Platform/backend" && node server.js
    healthCheckPath: /api/health
    envVars:
      - key: NODE_ENV
        value: production
      - key: MONGODB_URI
        # IMPORTANT: Set this value in the Render Dashboard envVars section
        # Do NOT commit sensitive credentials to this file
        sync: false
      - key: JWT_SECRET
        generateValue: true
      - key: JWT_REFRESH_SECRET
        generateValue: true
      - key: PORT
        value: 5005
      - key: CORS_ORIGIN
        value: https://realtyengage-frontend.onrender.com
      - key: RATE_LIMIT_WINDOW
        value: 15
      - key: RATE_LIMIT_MAX
        value: 100
      - key: SESSION_SECRET
        generateValue: true
      # Add other required API keys here in the Render Dashboard securely
    autoDeploy: true

  # Frontend Static Service
  - type: web
    name: realtyengage-frontend
    env: static # Static sites are free by default
    buildCommand: cd "Customer Engagement Platform/frontend" && npm install && npm run build
    staticPublishPath: "Customer Engagement Platform/frontend/dist"
    envVars:
      - key: VITE_API_URL
        value: https://realtyengage-api.onrender.com/api
    routes:
      - type: rewrite
        source: /*
        destination: /index.html

# Environment Groups for shared secrets
envVarGroups:
  - name: realtyengage-secrets
    envVars:
      - key: JWT_SECRET
        generateValue: true
      - key: JWT_REFRESH_SECRET
        generateValue: true
      - key: SESSION_SECRET
        generateValue: true
      - key: ENCRYPTION_KEY
        generateValue: true
