# Render.com Blueprint Configuration for RealtyEngage Backend

databases:
  - name: realtyengage-db
    plan: starter
    databaseName: realtyengage
    user: realtyengage_user
    region: oregon
    ipAllowList: [] # Allow connections from anywhere

services:
  # Main API Service
  - type: web
    name: realtyengage-api
    env: node
    plan: starter
    region: oregon
    buildCommand: cd backend && npm install && npm run build
    startCommand: cd backend && npm run start
    healthCheckPath: /health
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        fromDatabase:
          name: realtyengage-db
          property: connectionString
      - key: JWT_SECRET
        generateValue: true
      - key: JWT_REFRESH_SECRET
        generateValue: true
      - key: PORT
        value: 5000
      - key: CORS_ORIGIN
        value: https://realtyengage.netlify.app
      - key: RATE_LIMIT_WINDOW
        value: 15
      - key: RATE_LIMIT_MAX
        value: 100
      - key: SESSION_SECRET
        generateValue: true
      - key: REDIS_URL
        fromService:
          type: redis
          name: realtyengage-cache
          property: connectionString
      - key: EMAIL_HOST
        sync: false # Set manually
      - key: EMAIL_PORT
        value: 587
      - key: EMAIL_USER
        sync: false # Set manually
      - key: EMAIL_PASS
        sync: false # Set manually
      - key: RAZORPAY_KEY_ID
        sync: false # Set manually
      - key: RAZORPAY_KEY_SECRET
        sync: false # Set manually
      - key: GOOGLE_MAPS_API_KEY
        sync: false # Set manually
      - key: AWS_S3_BUCKET
        sync: false # Set manually
      - key: AWS_ACCESS_KEY_ID
        sync: false # Set manually
      - key: AWS_SECRET_ACCESS_KEY
        sync: false # Set manually
      - key: SENTRY_DSN
        sync: false # Set manually
    autoDeploy: true

  # Background Worker Service
  - type: worker
    name: realtyengage-worker
    env: node
    plan: starter
    region: oregon
    buildCommand: cd backend && npm install
    startCommand: cd backend && npm run worker
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        fromDatabase:
          name: realtyengage-db
          property: connectionString
      - key: REDIS_URL
        fromService:
          type: redis
          name: realtyengage-cache
          property: connectionString
      - key: EMAIL_HOST
        sync: false
      - key: EMAIL_PORT
        value: 587
      - key: EMAIL_USER
        sync: false
      - key: EMAIL_PASS
        sync: false

  # Redis Cache Service
  - type: redis
    name: realtyengage-cache
    plan: starter
    region: oregon
    maxmemoryPolicy: allkeys-lru

  # Cron Job Service
  - type: cron
    name: realtyengage-scheduler
    env: node
    plan: starter
    region: oregon
    schedule: "0 0 * * *" # Daily at midnight
    buildCommand: cd backend && npm install
    command: cd backend && npm run cron:daily
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        fromDatabase:
          name: realtyengage-db
          property: connectionString

# Environment Groups for shared secrets
envVarGroups:
  - name: realtyengage-secrets
    envVars:
      - key: JWT_SECRET
        generateValue: true
      - key: JWT_REFRESH_SECRET
        generateValue: true
      - key: SESSION_SECRET
        generateValue: true
      - key: ENCRYPTION_KEY
        generateValue: true
