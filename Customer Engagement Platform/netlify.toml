# Netlify Configuration for RealtyEngage Frontend

[build]
  base = "frontend"
  command = "npm run build"
  publish = "dist"
  ignore = "git diff --quiet $CACHED_COMMIT_REF $COMMIT_REF . ../backend"

[build.environment]
  NODE_VERSION = "18.17.0"
  NPM_VERSION = "9.6.7"
  VITE_API_URL = "https://realtyengage-api.onrender.com"

# Production context
[context.production]
  command = "npm run build:prod"
  
  [context.production.environment]
    NODE_ENV = "production"
    VITE_ENABLE_ANALYTICS = "true"
    VITE_ENABLE_ERROR_TRACKING = "true"

# Staging/preview context
[context.deploy-preview]
  command = "npm run build:preview"
  
  [context.deploy-preview.environment]
    NODE_ENV = "staging"
    VITE_API_URL = "https://realtyengage-api-staging.onrender.com"
    VITE_ENABLE_DEBUG = "true"

# Branch deploy context
[context.branch-deploy]
  command = "npm run build"
  
  [context.branch-deploy.environment]
    NODE_ENV = "development"

# Redirect rules for SPA
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200

# API proxy for development
[[redirects]]
  from = "/api/*"
  to = "https://realtyengage-api.onrender.com/api/:splat"
  status = 200
  force = true

# Security headers
[[headers]]
  for = "/*"
  
  [headers.values]
    # Security headers
    X-Frame-Options = "DENY"
    X-Content-Type-Options = "nosniff"
    X-XSS-Protection = "1; mode=block"
    Referrer-Policy = "strict-origin-when-cross-origin"
    Permissions-Policy = "camera=(), microphone=(self), geolocation=(self), payment=(self)"
    
    # CSP Header
    Content-Security-Policy = """
      default-src 'self';
      script-src 'self' 'unsafe-inline' 'unsafe-eval' https://apis.google.com https://www.googletagmanager.com;
      style-src 'self' 'unsafe-inline' https://fonts.googleapis.com;
      font-src 'self' https://fonts.gstatic.com;
      img-src 'self' data: https: blob:;
      connect-src 'self' https://realtyengage-api.onrender.com https://api.razorpay.com https://maps.googleapis.com wss://realtyengage-api.onrender.com;
      frame-src 'self' https://api.razorpay.com https://www.google.com;
      object-src 'none';
      base-uri 'self';
      form-action 'self';
      upgrade-insecure-requests;
    """

# Cache control for static assets
[[headers]]
  for = "/assets/*"
  
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/*.js"
  
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/*.css"
  
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/images/*"
  
  [headers.values]
    Cache-Control = "public, max-age=86400"

# Performance optimizations
[[plugins]]
  package = "@netlify/plugin-lighthouse"
  
  [plugins.inputs]
    output_path = "reports/lighthouse.html"
    
    [plugins.inputs.thresholds]
      performance = 0.9
      accessibility = 0.9
      best-practices = 0.9
      seo = 0.9

# Sitemap plugin
[[plugins]]
  package = "@netlify/plugin-sitemap"
  
  [plugins.inputs]
    buildDir = "dist"
    exclude = [
      "/admin/*",
      "/404",
      "/login",
      "/register"
    ]

# Submit sitemap to search engines
[[plugins]]
  package = "netlify-plugin-submit-sitemap"
  
  [plugins.inputs]
    baseUrl = "https://realtyengage.netlify.app"
    sitemapPath = "/sitemap.xml"
    providers = ["google", "bing"]

# Functions configuration
[functions]
  directory = "netlify/functions"
  node_bundler = "esbuild"

# Edge functions
[edge_functions]
  directory = "netlify/edge-functions"

# Development settings
[dev]
  command = "npm run dev"
  port = 3000
  targetPort = 5173
  publish = "dist"
  autoLaunch = true
